<header class="bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl fixed top-0 w-full z-50 shadow-[0_4px_30px_rgba(0,0,0,0.03)] flex justify-between items-center px-6 py-4 w-full">

<div class="flex items-center gap-6">
<nav class="hidden md:flex gap-8">

<div class="w-10 h-10 rounded-full bg-primary-container overflow-hidden">

<div class="col-span-2 space-y-6">
<div class="h-48 bg-surface-container-lowest rounded-lg p-8">

<div class="w-full h-24 bg-surface-container-low rounded-lg"></div>

<!-- Alert Overlay (The Task Goal) -->
<div class="fixed inset-0 z-[60] flex items-center justify-center p-6 backdrop-blur-md">
<div class="glass-card w-full max-w-md rounded-lg p-8 shadow-[0_32px_64px_-12px_rgba(0,88,187,0.15)] relative overflow-hidden flex flex-col items-center text-center">
<!-- Atmospheric Aura Blob inside card -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-48 h-48 bg-tertiary/5 rounded-full blur-3xl"></div>

<div class="w-20 h-20 bg-orange-50 rounded-full flex items-center justify-center mb-6 shadow-[0_8px_20px_rgba(249,115,22,0.1)]">
<span class="material-symbols-outlined text-5xl text-orange-500" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<!-- Content -->
<div class="space-y-3 relative z-10">
<h2 class="text-3xl font-headline font-extrabold text-on-primary-container tracking-tight">Burnout Risk Increasing</h2>
<p class="text-lg font-body text-on-surface-variant leading-relaxed">
                    Low sleep + high workload detected
                </p>
<div class="pt-2 flex flex-col items-center gap-2">
<div class="flex items-center gap-2 text-sm font-label text-error-dim font-bold uppercase tracking-wider">
<span class="material-symbols-outlined text-sm" data-icon="trending_up">trending_up</span>
                        Critical Threshold Approaching
                    </div>
</div>
</div>
<!-- Action -->
<div class="mt-10 w-full space-y-4 relative z-10">
<button class="w-full py-5 bg-gradient-to-r from-primary to-primary-dim text-white font-headline font-bold text-lg rounded-full shadow-[0_12px_24px_rgba(0,88,187,0.25)] hover:shadow-[0_16px_32px_rgba(0,88,187,0.35)] active:scale-95 transition-all duration-300">
                    Take Action Now
                </button>
<button class="w-full py-3 text-on-surface-variant font-semibold hover:text-primary transition-colors text-sm">
                    Remind me in 15 minutes
                </button>
</div>
</div>
</div>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] rounded-full border border-white/20 bg-white/40 dark:bg-slate-900/40 backdrop-blur-2xl shadow-[0_8px_32px_rgba(0,88,187,0.12)] flex justify-around items-center py-2 px-4 z-50 md:hidden">
