<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 50% 50%, #f2f7ff 0%, #ffffff 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .aura-blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
        }
        .breathing-circle-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .breathing-circle {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0058bb 0%, #6c9fff 100%);
            box-shadow: 0 0 60px rgba(0, 88, 187, 0.2), inset 0 0 40px rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .breathing-ring {
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            border: 2px solid rgba(0, 88, 187, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="text-on-surface">
<!-- Atmospheric Background Elements -->
<div class="aura-blob bg-primary-container w-[500px] h-[500px] -top-48 -left-48 rounded-full"></div>
<div class="aura-blob bg-tertiary-fixed w-[400px] h-[400px] -bottom-32 -right-32 rounded-full"></div>
<div class="aura-blob bg-secondary-fixed w-[300px] h-[300px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 rounded-full"></div>
<!-- Top Navigation (Suppressing full shell for task focus) -->
<nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-6 bg-transparent">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="bubble_chart">bubble_chart</span>
<span class="font-extrabold tracking-tighter text-xl text-primary">Atmosphere</span>
</div>
<button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-on-surface-variant hover:opacity-70 transition-opacity active:scale-95">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</nav>
<!-- Main Content Canvas -->
<main class="relative h-screen flex flex-col items-center justify-center px-6">
<!-- Header & Instructions -->
<div class="text-center mb-16">
<p class="text-primary font-bold tracking-[0.2em] uppercase text-[10px] mb-4">Deep Calm Phase</p>
<h1 class="text-4xl md:text-5xl font-extrabold text-on-primary-container tracking-tight mb-2">Breathe in...</h1>
<div class="flex items-center justify-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-sm" data-icon="timer">timer</span>
<span class="font-bold text-sm tracking-widest">04:20</span>
</div>
</div>
<!-- Central Breathing Engine -->
<div class="breathing-circle-container mb-20">
<!-- Decorative outer ring -->
<div class="breathing-ring"></div>
<!-- The core fluid circle -->
<div class="breathing-circle">
<div class="w-3/4 h-3/4 rounded-full border border-white/20 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-6xl opacity-40" data-icon="air" style="font-variation-settings: 'FILL' 0;">air</span>
</div>
</div>
<!-- Pulse Glow -->
<div class="absolute inset-0 bg-primary/10 blur-[100px] rounded-full -z-10 scale-150"></div>
</div>
<!-- Controls Bento Section -->
<div class="grid grid-cols-2 gap-4 w-full max-w-md">
<!-- Pause Button -->
<button class="glass-panel group flex flex-col items-center justify-center py-6 rounded-lg transition-all duration-300 hover:bg-white/60 active:scale-95">
<div class="w-12 h-12 rounded-full bg-primary-container/20 text-primary flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="pause" style="font-variation-settings: 'FILL' 1;">pause</span>
</div>
<span class="font-bold text-sm text-primary tracking-wide">Pause</span>
</button>
<!-- End Button -->
<button class="glass-panel group flex flex-col items-center justify-center py-6 rounded-lg transition-all duration-300 hover:bg-white/60 active:scale-95">
<div class="w-12 h-12 rounded-full bg-error-container/10 text-error flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="close" style="font-variation-settings: 'FILL' 0;">close</span>
</div>
<span class="font-bold text-sm text-on-surface-variant tracking-wide">End Session</span>
</button>
</div>
<!-- Subtle Prompt Text -->
<div class="mt-12 text-center max-w-xs">
<p class="text-on-surface-variant text-sm leading-relaxed opacity-60">
                Focus your gaze on the center and match your pace to the expanding circle.
            </p>
</div>
</main>
<!-- Contextual Status Bar (Glassmorphic) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 w-auto px-6 py-3 glass-panel rounded-full flex items-center gap-6 shadow-lg shadow-primary/5 border border-white/40">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-tertiary shadow-[0_0_10px_#6ffb85]"></div>
<span class="text-[11px] font-bold text-on-surface-variant tracking-wide">HR: 68 BPM</span>
</div>
<div class="h-4 w-[1px] bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg" data-icon="water_drop" style="font-variation-settings: 'FILL' 1;">water_drop</span>
<span class="text-[11px] font-bold text-on-surface-variant tracking-wide">CALM STATE</span>
</div>
</div>
